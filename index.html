<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Little Question 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:    #e8677a;
    --rose-lt: #fde8ec;
    --cream:   #fff8f4;
    --gold:    #c9933a;
    --text:    #3d1a24;
    --muted:   #9a6472;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* ── FLOATING PETALS ── */
  .petal-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .petal {
    position: absolute;
    top: -60px;
    font-size: 22px;
    animation: fall linear infinite;
    opacity: 0.55;
    user-select: none;
  }
  @keyframes fall {
    0%   { transform: translateY(0)    rotate(0deg)   translateX(0); opacity: 0.5; }
    50%  { transform: translateY(50vh) rotate(180deg) translateX(30px); }
    100% { transform: translateY(105vh) rotate(360deg) translateX(-20px); opacity: 0; }
  }

  /* ── CARD ── */
  .card {
    position: relative; z-index: 1;
    background: #fff;
    border-radius: 32px;
    padding: 3rem 3.5rem 2.5rem;
    max-width: 520px;
    width: 90%;
    box-shadow: 0 8px 48px rgba(200, 80, 100, 0.13), 0 2px 12px rgba(0,0,0,0.06);
    border: 1.5px solid rgba(232, 103, 122, 0.18);
    text-align: center;
  }

  .envelope-icon {
    font-size: 48px;
    display: block;
    margin-bottom: .5rem;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    color: var(--text);
    line-height: 1.3;
    margin-bottom: .6rem;
  }
  h1 em { font-style: italic; color: var(--rose); }

  .sub {
    font-size: .95rem;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 2.2rem;
    line-height: 1.7;
  }

  /* ── CHARACTER ── */
  .char-wrap {
    height: 130px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-bottom: 1.5rem;
    position: relative;
  }

  /* CSS Bear */
  .bear { position: relative; display: inline-block; }
  .bear-body {
    width: 80px; height: 72px;
    background: #f5c6a0;
    border-radius: 40px 40px 36px 36px;
    position: relative;
    margin: 0 auto;
  }
  .bear-tummy {
    width: 46px; height: 42px;
    background: #fde2c9;
    border-radius: 50%;
    position: absolute; bottom: 8px; left: 17px;
  }
  .bear-head {
    width: 72px; height: 64px;
    background: #f5c6a0;
    border-radius: 50%;
    position: absolute; top: -52px; left: 4px;
  }
  .bear-ear {
    width: 22px; height: 22px;
    background: #f5c6a0;
    border-radius: 50%;
    position: absolute; top: -8px;
  }
  .bear-ear.l { left: 3px; }
  .bear-ear.r { right: 3px; }
  .bear-ear-inner {
    width: 12px; height: 12px;
    background: #f0a892;
    border-radius: 50%;
    position: absolute; top: 5px; left: 5px;
  }
  .bear-eye {
    width: 10px; height: 10px;
    background: #3d1a24;
    border-radius: 50%;
    position: absolute; top: 20px;
  }
  .bear-eye.l { left: 14px; }
  .bear-eye.r { right: 14px; }
  .bear-eye::after {
    content: '';
    width: 4px; height: 4px;
    background: #fff;
    border-radius: 50%;
    position: absolute; top: 1px; left: 1px;
  }
  .bear-nose {
    width: 16px; height: 11px;
    background: #c97c6b;
    border-radius: 50%;
    position: absolute; top: 33px; left: 28px;
  }
  .bear-mouth {
    position: absolute; top: 44px; left: 22px;
    width: 28px; height: 12px;
    border-bottom: 2.5px solid #c97c6b;
    border-left: 2.5px solid #c97c6b;
    border-right: 2.5px solid #c97c6b;
    border-radius: 0 0 14px 14px;
  }
  .bear-arm {
    width: 22px; height: 38px;
    background: #f5c6a0;
    border-radius: 12px;
    position: absolute; bottom: 14px;
  }
  .bear-arm.l { left: -14px; transform: rotate(18deg); transform-origin: top center; }
  .bear-arm.r { right: -14px; transform: rotate(-18deg); transform-origin: top center; }
  .bear-leg {
    width: 26px; height: 28px;
    background: #f5c6a0;
    border-radius: 0 0 14px 14px;
    position: absolute; bottom: -14px;
  }
  .bear-leg.l { left: 10px; }
  .bear-leg.r { right: 10px; }

  .bear-blush {
    width: 16px; height: 10px;
    background: rgba(240,120,120,0.35);
    border-radius: 50%;
    position: absolute; top: 28px;
    opacity: 0;
    transition: opacity .3s;
  }
  .bear-blush.l { left: 4px; }
  .bear-blush.r { right: 4px; }

  /* bear heart */
  .bear-heart {
    font-size: 20px;
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    opacity: 0;
    transition: opacity .3s;
    animation: float-heart 1.2s ease-in-out infinite;
  }
  @keyframes float-heart {
    0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-7px)}
  }

  /* bear speech bubble */
  .speech {
    position: absolute;
    top: -48px; right: -80px;
    background: var(--rose-lt);
    border: 1.5px solid var(--rose);
    border-radius: 16px 16px 16px 4px;
    padding: 6px 14px;
    font-size: .82rem;
    color: var(--rose);
    font-weight: 400;
    white-space: nowrap;
    opacity: 0;
    transform: scale(0.7) translateY(8px);
    transform-origin: bottom left;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
  }

  /* bear idle bounce */
  .bear-body { animation: idle 2.8s ease-in-out infinite; }
  @keyframes idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* bear begging shake */
  .bear.begging .bear-body { animation: beg 0.42s ease-in-out infinite; }
  @keyframes beg { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
  .bear.begging .bear-arm.l { animation: arm-wave 0.42s ease-in-out infinite alternate; }
  .bear.begging .bear-arm.r { animation: arm-wave 0.42s ease-in-out infinite alternate-reverse; }
  @keyframes arm-wave { from{transform:rotate(18deg)} to{transform:rotate(50deg)} }
  .bear.begging .bear-blush { opacity: 1; }
  .bear.begging .speech { opacity: 1; transform: scale(1) translateY(0); }

  /* bear happy */
  .bear.happy .bear-body { animation: spin-happy 0.6s ease forwards; }
  @keyframes spin-happy { 0%{transform:rotate(0)} 100%{transform:rotate(360deg) scale(1.15)} }
  .bear.happy .bear-heart { opacity: 1; }
  .bear.happy .bear-blush { opacity: 1; }
  .bear.happy .bear-mouth {
    border-top: 2.5px solid #c97c6b;
    border-bottom: none;
    border-radius: 14px 14px 0 0;
    top: 40px;
  }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-top: .5rem;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Lato', sans-serif;
    font-size: 1.05rem;
    font-weight: 400;
    border: none;
    border-radius: 50px;
    padding: .8rem 2.2rem;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, background .2s;
    outline: none;
    letter-spacing: .03em;
  }
  .btn:active { transform: scale(.96); }

  .btn-yes {
    background: var(--rose);
    color: #fff;
    box-shadow: 0 4px 18px rgba(232, 103, 122, 0.4);
  }
  .btn-yes:hover { background: #d9556a; transform: scale(1.05); }

  .btn-no {
    background: #fff;
    color: var(--muted);
    border: 1.5px solid #e4c0c9;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), font-size .3s, opacity .3s;
  }
  .btn-no:hover { border-color: var(--rose); color: var(--rose); }

  /* ── NO COUNTER ── */
  .no-count {
    font-size: .78rem;
    color: #c9a0aa;
    margin-top: 1.2rem;
    min-height: 1.2em;
    transition: opacity .3s;
  }

  /* ── SUCCESS SCREEN ── */
  #success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.1rem;
    animation: pop-in .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop-in { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
  #success h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--text);
  }
  #success h2 em { font-style: italic; color: var(--rose); }
  #success p { color: var(--muted); font-weight: 300; font-size: .95rem; line-height: 1.7; }
  .hearts-burst {
    font-size: 2.5rem;
    display: flex; gap: .5rem;
    animation: hearts-pop .6s ease both;
  }
  @keyframes hearts-pop {
    from{transform:scale(0) rotate(-30deg);opacity:0}
    to{transform:scale(1) rotate(0);opacity:1}
  }

  /* ── NOTIFICATION BADGE ── */
  .notif-badge {
    font-size: .72rem;
    background: #edfaf3;
    color: #2d9161;
    border: 1px solid #b0e0c8;
    border-radius: 8px;
    padding: 5px 12px;
    margin-top: .3rem;
    display: inline-block;
  }
  .notif-badge.sending { background: #fff8e8; color: #b07a20; border-color: #f5d89a; }
  .notif-badge.error   { background: #fff0f0; color: #c0392b; border-color: #f5b8b8; }
</style>
</head>
<body>

<!-- Falling petals -->
<div class="petal-layer" id="petals"></div>

<div class="card" id="main-card">

  <!-- Proposal view -->
  <div id="proposal-view">
    <span class="envelope-icon">💌</span>
    <h1>Hey you,<br><em>Will you be my girlfriend?</em></h1>
    <p class="sub">I've been wanting to ask you this for a while now.<br>You make every day a little brighter. 🌸</p>

    <!-- Bear character -->
    <div class="char-wrap">
      <div class="bear" id="bear">
        <div class="bear-body">
          <div class="bear-tummy"></div>
          <div class="bear-head">
            <div class="bear-ear l"><div class="bear-ear-inner"></div></div>
            <div class="bear-ear r"><div class="bear-ear-inner"></div></div>
            <div class="bear-eye l"></div>
            <div class="bear-eye r"></div>
            <div class="bear-blush l"></div>
            <div class="bear-blush r"></div>
            <div class="bear-nose"></div>
            <div class="bear-mouth"></div>
            <div class="bear-heart">💗</div>
            <div class="speech" id="speech">Please say Yes! 🥺</div>
          </div>
          <div class="bear-arm l"></div>
          <div class="bear-arm r"></div>
          <div class="bear-leg l"></div>
          <div class="bear-leg r"></div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-yes" id="btn-yes">Yes! 💕</button>
      <button class="btn btn-no" id="btn-no">No 😶</button>
    </div>
    <div class="no-count" id="no-count"></div>
  </div>

  <!-- Success view -->
  <div id="success">
    <div class="hearts-burst">💖 💗 💕</div>
    <h2>She said <em>Yes!</em></h2>
    <p>This is the best day ever.<br>I promise to be worth it. 🌹</p>
    <div id="notif-status" class="notif-badge">Letting him know… 📨</div>
  </div>

</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  // Change NTFY_TOPIC to a secret random string of your choosing.
  // Then subscribe to it in the ntfy app on your phone (ntfy.sh).
  const NTFY_TOPIC = "my-proposal-alert-CHANGE-THIS-RANDOM-STRING";
  // ────────────────────────────────────────────────────────────────────────────

  const messages = [
    "Please say Yes! 🥺",
    "Pretty please? 🐾",
    "Come onnnn… 🥺💕",
    "I'll be SO happy! 💗",
    "Just once… say yes? ✨",
    "My heart is breaking here 💔",
    "One tiny YES is all I need 🙏",
    "I'm not giving up! 🐻💕",
    "PLEASE?! 🥺🥺🥺",
    "You're my favourite human 🌸",
  ];

  let noCount = 0;
  const bear = document.getElementById("bear");
  const speech = document.getElementById("speech");
  const btnNo = document.getElementById("btn-no");
  const btnYes = document.getElementById("btn-yes");
  const noCountEl = document.getElementById("no-count");

  // ── PETALS ──
  const EMOJIS = ["🌸","🌹","💮","🌷","❀","💕","🫧"];
  const petalLayer = document.getElementById("petals");
  for (let i = 0; i < 18; i++) {
    const p = document.createElement("span");
    p.className = "petal";
    p.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (7 + Math.random() * 9) + "s";
    p.style.animationDelay = (-Math.random() * 14) + "s";
    p.style.fontSize = (16 + Math.random() * 14) + "px";
    petalLayer.appendChild(p);
  }

  // ── NO BUTTON ──
  btnNo.addEventListener("click", () => {
    noCount++;
    bear.classList.remove("happy");
    bear.classList.add("begging");

    const msg = messages[(noCount - 1) % messages.length];
    speech.textContent = msg;

    // Count label
    const labels = [
      "", "Once is enough to try again 🥺", "Twice? The bear is devastated 😢",
      "Three times?! 💔", "Four... really? 🐻💔",
    ];
    noCountEl.textContent = noCount < labels.length ? labels[noCount]
      : `That's ${noCount} times. The bear hasn't given up yet. 🐾`;

    // Shrink No button slightly each time (min 70%)
    const scale = Math.max(0.70, 1 - noCount * 0.035);
    btnNo.style.transform = `scale(${scale})`;
    btnNo.style.opacity   = Math.max(0.5, 1 - noCount * 0.04);

    // Stop begging after a moment, go back to idle
    clearTimeout(bear._begTimer);
    bear._begTimer = setTimeout(() => {
      bear.classList.remove("begging");
    }, 3500);
  });

  // ── YES BUTTON ──
  btnYes.addEventListener("click", () => {
    bear.classList.remove("begging");
    bear.classList.add("happy");

    setTimeout(() => {
      document.getElementById("proposal-view").style.display = "none";
      const success = document.getElementById("success");
      success.style.display = "flex";
      sendNotification();
    }, 600);
  });

  // ── NOTIFICATION via ntfy.sh ──
  async function sendNotification() {
    const statusEl = document.getElementById("notif-status");
    statusEl.className = "notif-badge sending";
    statusEl.textContent = "Sending notification… 📨";

    const timestamp = new Date().toLocaleString();
    try {
      const res = await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain",
          "Title": "She said YES! 💍",
          "Priority": "urgent",
          "Tags": "heart,tada",
        },
        body: `She said YES to your proposal! 🎉\n\nTime: ${timestamp}`,
      });

      if (res.ok) {
        statusEl.className = "notif-badge";
        statusEl.textContent = "✓ Notification sent! He knows 💌";
      } else {
        throw new Error(`HTTP ${res.status}`);
      }
    } catch (err) {
      statusEl.className = "notif-badge error";
      statusEl.textContent = "⚠ Notification failed — check the topic name";
      console.error("ntfy error:", err);
    }
  }
</script>
</body>
</html>
